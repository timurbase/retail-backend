# Explicit Nixpacks config — Python 3.12 + uv via python -m pip (v2).
#
# Note: nix's `python312` exposes the interpreter as `python` (no bare `pip`
# binary on PATH). Use `python -m pip` for the bootstrap, then `uv` handles
# everything else.

[phases.setup]
nixPkgs = [
  "python312",
  "gcc",
  "postgresql_16",  # provides libpq for psycopg
  "openssl",
  "zlib",
]
aptPkgs = ["libpq-dev", "build-essential"]

[phases.install]
cmds = [
  "python -m ensurepip --upgrade",
  "python -m pip install --upgrade pip uv",
  "uv sync --no-dev",
]

[phases.build]
# No Django commands at build — collectstatic + migrate run in start-web.sh.

[variables]
PYTHONUNBUFFERED = "1"
